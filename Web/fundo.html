<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Aula de Cores</title>
</head>
<body>

    <h1>Teste de Fundo</h1>
    <button id="btnAzul">Ficar Azul</button>
    <button id="btnVerde">Ficar Verde</button>

    <script>
        const corpo = document.body; // Aqui pegamos a tela toda

        document.getElementById('btnAzul').onclick = function() {
            corpo.style.backgroundColor = "blue";
        };

        document.getElementById('btnVerde').onclick = function() {
            corpo.style.backgroundColor = "green";
        };
    </script>

</body>
</html>
